{{- if .Values.createServiceAccount }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-listing-sa
---
{{- end }}
{{- if .Values.createRole }}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pods-list
rules:
- apiGroups: [""]
  resources: ["pods", "pods/status"]
  verbs: ["get", "watch", "list"]
---
{{- end }}
{{- if .Values.createRoleBinding }}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pods-list
subjects:
- kind: ServiceAccount
  name: pod-listing-sa
  namespace: reportnet
roleRef:
  kind: Role
  name: pods-list
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}