        version: v0.0.1
        chart_repo: ../kafka
        values_file: rn3-dev-ran2-kafka.yaml
        namespace: reportnet
        deploy_type: statefull
        script_shell: "-"
        init_shell: "-"
        custom_deployment: >-
          export chart_repo=../kafka
          export release_name=kafka
          export chart_name=kafka
          export values_file=rn3-dev-ran2-kafka.yaml
          export NS=reportnet
          export KC=~/.kube/dev/config
          export KRAFT_CLUSTER_ID=dev-ran2-kafka-01
          export INTER_BROKER_PASSWORD=$(grep "INTER_BROKER_PASSWORD" .secrets.prv | cut -d '=' -f2)
          export CONTROLLER_PASSWORD=$(grep "CONTROLLER_PASSWORD" .secrets.prv | cut -d '=' -f2)
          helm --kubeconfig $KC -n $NS upgrade --install $release_name $chart_repo/. -f ../kafka/$values_file --set sasl.interbroker.password=$INTER_BROKER_PASSWORD --set sasl.controller.password=$CONTROLLER_PASSWORD --set kraft.clusterId=$KRAFT_CLUSTER_ID --set resources.requests.memory=3Gi --set resources.limit.memory=3Gi --debug ;


