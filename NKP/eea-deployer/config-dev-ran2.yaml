          export pass=$(grep DBPASS .secrets.prv | cut -d '=' -f2);
          kubectl --kubeconfig $KC -n $NS delete secret citus-secrets;
          kubectl --kubeconfig $KC -n $NS create secret generic citus-secrets --from-literal password=$pass --from-literal userpass=$dbpass ;
        custom_deployment: "-"
          #helm --kubeconfig $KC -n $NS upgrade --install citus . -f rn3-staging-nkp-citus.yaml --set fullnameOverride=citus,metrics.enabled=true --debug

