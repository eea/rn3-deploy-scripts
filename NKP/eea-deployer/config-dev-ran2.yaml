      ################################### POSTGRESQL ######################################
      - release_name: rn3-pg-helm
        chart_name: helm
        version: v0.0.1
        chart_repo: ../postgresql
        values_file: rn3-dev-ran2-postgresql.yaml
        namespace: reportnet
        deploy_type: "-" #statefull
        script_shell: >-
          export dbpass=$(grep DBPASS .secrets.prv | cut -d '=' -f2);
          export repmgrpass=$(grep REPMGRPASS .secrets.prv | cut -d '=' -f2);
          export adminpass=$(grep ADMINPASS .secrets.prv | cut -d '=' -f2);
          kubectl --kubeconfig $KC -n $NS exec -i -t -n reportnet rn3-pg-helm-postgresql-0 -c postgresql -- bash -c 'rm -Rf  /tmp/migration';
          kubectl --kubeconfig $KC -n $NS cp ../postgresql/migration rn3-pg-helm-postgresql-0:/tmp/;
          kubectl --kubeconfig $KC -n $NS exec -i -t -n reportnet rn3-pg-helm-postgresql-0 -c postgresql -- bash -c 'ls -la  /tmp/migration';
          chmod a+x ./scripts/migrate.sh;
          ./scripts/migrate.sh;
          chmod a+x ./scripts/pgpool-usr-fix.sh;
          ./scripts/pgpool-usr-fix.sh dev $NS $KC
        init_shell: >-
          kubectl --kubeconfig $KC -n $NS delete secret pg-secret;
          export dbpass=$(grep DBPASS .secrets.prv | cut -d '=' -f2);
          export repmgrpass=$(grep REPMGRPASS .secrets.prv | cut -d '=' -f2);
          export adminpass=$(grep ADMINPASS .secrets.prv | cut -d '=' -f2);
          kubectl --kubeconfig $KC -n $NS create secret generic pg-secret --from-literal admin-password=$adminpass --from-literal pg-pass=$dbpass --from-literal pg-sand-data-pass=postgres --from-literal postgresql-password=$dbpass --from-literal repmgr-password=$repmgrpass;
        custom_deployment: >-
          export chart_repo=../postgresql
          export release_name=helm
          export chart_name=rn3-pg
          export values_file=../postgresql/rn3-dev-ran2-postgresql.yaml
          export NS=reportnet
          export dbpass=$(grep DBPASS .secrets.prv | cut -d '=' -f2);
          export repmgrpass=$(grep REPMGRPASS .secrets.prv | cut -d '=' -f2);
          export adminpass=$(grep ADMINPASS .secrets.prv | cut -d '=' -f2);
          helm --kubeconfig $KC -n $NS upgrade --install rn3-pg-$release_name $chart_repo/. -f $values_file --set fullnameOverride=rn3-pg-helm,metrics.enabled=true --debug;
      #################################### CITUS ######################################
      - release_name: citus
        chart_name: citus
        version: v0.0.1
