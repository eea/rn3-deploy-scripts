    # ################################### POSTGRESQL ######################################
      - release_name: rn3-pg-helm
        chart_name: rn3-pg-helm
        #version: v0.0.1
        chart_repo: ../postgresql
        values_file: rn3-staging-nkp-postgresql.yaml
        namespace: reportnet
        deploy_type: statefull
        script_shell: >-
          export dbpass=53p057n373.0!
          export repmgrpass=OWI9xc2s6R
          export adminpass=1ieiAGPu8i
          kubectl --kubeconfig $KC -n $NS create secret generic pg-secret \
          --from-literal admin-password=$adminpass \
          --from-literal pg-pass=$dbpass \
          --from-literal pg-sand-data-pass=postgres \
          --from-literal postgresql-password=$dbpass \
          --from-literal repmgr-password=$repmgrpass
          export REPMGR_PASSWORD=$(kubectl get secret --namespace reportnet pg-secret -o jsonpath="{.data.repmgr-password}" | base64 --decode) && echo $REPMGR_PASSWORD
          pgpgpool-usr-fix.sh
        init_shell: >-
          date=$(date '+%Y-%m-%d %H:%M:%S')
          echo "hello from init " $date >> /tmp/hello.txt
          cat /tmp/hello.txt
