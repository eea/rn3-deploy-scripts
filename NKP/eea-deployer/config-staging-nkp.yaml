      - release_name: rn3-pg-helm
        chart_name: helm
        #version: v0.0.1
        chart_repo: ../postgresql
        values_file: rn3-staging-nkp-postgresql.yaml
        namespace: reportnet
        deploy_type: statefull
        #script_shell: |
        #  export KC=~/.kube/staging/config
        #  export NAMESPACE=reportnet
        #  export CHART_REPO=../postgresql
