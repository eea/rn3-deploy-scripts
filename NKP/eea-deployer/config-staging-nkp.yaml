    # ################################### KAFKA ######################################
      - release_name: kafka
        chart_name: kafka
        debug: true
        #version: v0.0.1
        chart_repo: ../kafka
        values_file: rn3-staging-nkp-kafka.yaml
        namespace: reportnet
        deploy_type: statefull
        #script_shell: 
        #init_shell: 
        custom_deployment: >-
          export INTER_BROKER_PASSWORD=$(grep "INTER_BROKER_PASSWORD" .secrets.prv | cut -d '=' -f2);
          export CONTROLLER_PASSWORD=$(grep "CONTROLLER_PASSWORD" .secrets.prv | cut -d '=' -f2);
          export KRAFT_CLUSTER_ID="nkp-stg-kafka-01";
          export chart_repo="../kafka";
          export release_name="kafka";
          export chart_name="kafka";
          export values_file="rn3-staging-nkp-kafka.yaml";
          export NS="reportnet";
          export KC="~/.kube/staging/config";
          helm --kubeconfig $KC -n $NS upgrade --install kafka ../kafka -f ../kafka/rn3-staging-nkp-kafka.yaml --set sasl.interbroker.password=$INTER_BROKER_PASSWORD --set sasl.controller.password=$CONTROLLER_PASSWORD --set kraft.clusterId=$KRAFT_CLUSTER_ID --set resources.requests.memory=3Gi --set resources.limit.memory=3Gi;


