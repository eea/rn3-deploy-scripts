dry_run: false
create_namespace: false
wait: false
timeout: true # If true, defaults to 20 mins
debug: true
kc: "~/.kube/staging/config"
init: true
script: true
charts:
      #################################### CONSUL ######################################
      - release_name: consul
        chart_name: consul
        debug: true
        #version: v0.0.1
        chart_repo: ../consul
        values_file: rn3-staging-nkp-consul.yaml
        namespace: reportnet
        deploy_type: statefull
        script_shell: >-
          date=$(date '+%Y-%m-%d %H:%M:%S') && \
          echo "hello from init " $date >> /tmp/hello.txt && \
          cat /tmp/hello.txt && \
          exit;
        init_shell: >-
          date=$(date '+%Y-%m-%d %H:%M:%S') && \
          echo "hello from init " $date >> /tmp/hello.txt && \
          cat /tmp/hello.txt && \
          exit;
