        # init_shell: >-
        #   echo $(kubectl --kubeconfig $KC -n $NS delete secret pg-secret);
        #   echo $(export dbpass=$(grep DBPASS .secrets.prv | cut -d '=' -f2));
        #   echo $(export repmgrpass=$(grep REPMGRPASS .secrets.prv | cut -d '=' -f2));
        #   echo $(export adminpass=$(grep ADMINPASS .secrets.prv | cut -d '=' -f2));
        #   kubectl --kubeconfig $KC -n $NS create secret generic pg-secret --from-literal admin-password=$adminpass --from-literal pg-pass=$dbpass --from-literal pg-sand-data-pass=postgres --from-literal postgresql-password=$dbpass --from-literal repmgr-password=$repmgrpass
        custom_deployment: >-
          export chart_repo=../postgresql
          export release_name=helm
          export chart_name=rn3-pg
          export values_file=../postgresql/rn3-staging-nkp-postgresql.yaml
          export NS=reportnet
          export dbpass=$(grep DBPASS .secrets.prv | cut -d '=' -f2);
          export repmgrpass=$(grep REPMGRPASS .secrets.prv | cut -d '=' -f2);
          export adminpass=$(grep ADMINPASS .secrets.prv | cut -d '=' -f2);
          kubectl --kubeconfig $KC -n $NS delete secret pg-secret;
          kubectl --kubeconfig $KC -n $NS create secret generic pg-secret --from-literal admin-password=$adminpass --from-literal pg-pass=$dbpass --from-literal pg-sand-data-pass=postgres --from-literal postgresql-password=$dbpass --from-literal repmgr-password=$repmgrpass;
          helm --kubeconfig $KC -n $NS upgrade --install rn3-pg-$release_name $chart_repo/. -f $values_file --set fullnameOverride=rn3-pg-helm,metrics.enabled=true --debug;

