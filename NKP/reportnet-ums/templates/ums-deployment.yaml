---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ums
  labels:
    name: ums
    cleanup: "{{.Release.Namespace}}-{{.Chart.Name}}-services"
spec:
  replicas: {{.Values.replicas}}
  selector:
        matchLabels:
          name: ums
  template:
    metadata:
      labels:
        name: ums
        cleanup: "{{.Release.Namespace}}-{{.Chart.Name}}-services"
    spec:
      restartPolicy: Always
      dnsPolicy: ClusterFirst

      containers:
      - name: ums
        image: {{.Values.repo}}/user-management-service:{{.Values.version}}{{.Values.tagSufix}}
        imagePullPolicy: Always
        resources:
          limits:
            #cpu: "100m"
            memory: 0.5Gi
          requests:
            #cpu: "100m"
            memory: 0.5Gi
        ports:
        - containerPort: 9010
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /actuator/health
            scheme: HTTP
            port: 9010
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            scheme: HTTP
            port: 9010
          initialDelaySeconds: 15
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 5
        env:
        - name: CONSUL_HOST
          value: "{{.Values.consul.server}}"
        - name: CONSUL_PORT
          value: "{{.Values.consul.port}}"
        - name: KAFKA_BOOTSTRAP_URL
          value: "{{.Values.kafka.bootstrap}}:{{.Values.kafka.port}}"
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ums-kc
              key: password
        - name: KEYCLOAK_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: ums-kc
              key: username
        - name: KEYCLOAK_CLIENT_ID
          value: "reportnet"
        - name: KEYCLOAK_HOST
          value: "keycloak-http"
        - name: KEYCLOAK_REAM_NAME
          value: "Reportnet"
        - name: REDIS_HOST
          value: "{{.Values.redis.ip}}"
        - name: REDIS_PORT
          value: "{{.Values.redis.port}}"
        - name: REDIS_SENTINEL_MASTER
          value: "{{.Values.redis.sentinel}}"
        - name: REDIS_SENTINEL_NODES
          value: "{{.Values.redis.nodes}}"
        - name: SENTRY_RELEASE
          value: "{{.Values.version}}"
        - name: UMS_EXPORT_FILES_PATH
          value: "{{.Values.file.path}}"
  
          
        volumeMounts:
        - mountPath: "{{.Values.file.path}}"
          name: load-data  
      volumes:
      - name: load-data
        persistentVolumeClaim:
            claimName: reportnet3-data


  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
