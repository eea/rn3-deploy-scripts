# Default values for consul.
# This is a YAML-formatted file.
# Declare name/value pairs to be passed into your templates.
# name: value
HttpPort: 8500
RpcPort: 8400
SerflanPort: 8301
SerflanUdpPort: 8301
SerfwanPort: 8302
SerfwanUdpPort: 8302
ServerPort: 8300
ConsulDnsPort: 8600
Domain: consul
Component: "consul"
Replicas: 1
Image: "consul"
ImageTag: "1.5.3"
ImagePullPolicy: "Always"
Resources: 
 # requests:
 #   cpu: "100m"
 #   memory: "256Mi"
 # limits:
 #   cpu: "500m"
 #   memory: "512Mi"
 requests:
   #cpu: "100m"
   memory: "512m"
 limits:
   #cpu: "500m"
   memory: "512m"
priorityClassName: ""
Storage: "5Gi"
accessModes:
  - ReadWriteOnce




DisableHostNodeId: false
# DatacenterName: dc1
joinPeers: []
joinWan: []
Gossip:
  Encrypt: true
  Create: true
# GossipKey: key
# StorageClass: "-"
StorageClass: ""
maxUnavailable: 1
