affinity: |
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: NotIn
          values:
          - nkp-transport-fra-md-0-trjg6-hqw6m-7h9j4




ui:
  enabled: true
uiService:
  enabled: true
  type: "NodePort"
  annotations: {}
ConsulConfig: []
#  - type: secret
#    name: consul-defaults
#  - type: configMap
#    name: consul-defaults
uiIngress:
  enabled: false
  annotations: {}
  labels: {}
  hosts: []
  path: /
  tls: []
acl:
  enabled: false
  masterToken: ""
  agentToken: ""
test:
  image: lachlanevenson/k8s-kubectl
  imageTag: v1.4.8-bash
  rbac:
    create: false
    serviceAccountName: ""
nodeSelector: {}
tolerations: []
additionalLabels: {}
podAnnotations: {}
# Lifecycle for StatefulSet
# lifecycle:
#   preStop:
#     exec:
#       command:
#       - sh
#       - -c
#       - "sleep 60"
forceIpv6: false
