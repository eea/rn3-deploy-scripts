# Default values for rn3-pgsql-kc-bck.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: dwdraju/alpine-curl-jq
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  #tag: "latest"

imagePullSecrets: []
nameOverride: "rn3-pgsql-kc-bck"
fullnameOverride: "rn3-pgsql-kc-bck"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "rn3-pgsql-kc-bck"



#################################
### CONFIGURATION FOR THE BATCH / CRON JOB

runner_image: "bitnami/postgresql-repmgr:11.7.0-debian-10-r74"
schedule: "0 7 * * *" 
#debugging only - every hour 
#schedule: "0 * * * *" 

securityContext:
  runAsUser: 0
  privileged: true

#you can bypass this using the set flag like this :
# helm --kubeconfig $KC -n $NS upgrade --install rn3-pgsql-kc-bck . -f values.yaml --debug --set environment=dev
environment: dev

envconfig:
  - name: LANG
    value: en_US.UTF-8
  - name: PGHOST
    value: rn3-pg-helm-postgresql-headless
  - name: PGDATABASE
    value: keycloak
  - name: PGUSER
    value: postgres
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: rn3-pg-helm-postgresql
        key: postgresql-password

volumeMounts:
  - mountPath: /keycloak-backups
    name: keycloak-backups

volumes:
  - name: keycloak-backups
    persistentVolumeClaim:
      claimName: pv-kc-bck-0-claim 


podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: 
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
